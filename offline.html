<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080817">
  <title>KageNexus Offline</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 15%,#3f236e 0,transparent 34%),radial-gradient(circle at 85% 80%,#006d86 0,transparent 32%),#05040d;color:#fff}.card{width:min(100%,440px);padding:30px;border:1px solid #7569bb77;border-radius:28px;background:#0d0b1de8;box-shadow:0 30px 100px #000c;text-align:center}.sigil{width:84px;height:84px;margin:auto;display:grid;place-items:center;border:2px solid #57e9ff;border-radius:50%;box-shadow:0 0 28px #31dbff66;color:#fff;font-size:34px;font-weight:950}.kicker{margin:22px 0 7px;color:#58e9ff;font-size:10px;font-weight:950;letter-spacing:.2em}.card h1{margin:0;font-size:34px;letter-spacing:-.04em}.card p{color:#aaa7bd;line-height:1.55}.card button{width:100%;height:50px;margin-top:12px;border:0;border-radius:15px;background:linear-gradient(135deg,#6d4cff,#18cce4);color:#fff;font-weight:950}.hint{font-size:11px;color:#777389;margin-top:14px}
  </style>
</head>
<body>
  <main class="card">
    <div class="sigil">KN</div>
    <p class="kicker">OFFLINE MODE</p>
    <h1>The Nexus is disconnected.</h1>
    <p>Your saved progress is still on this device. Reconnect to load uncached anime searches or app updates.</p>
    <button onclick="location.reload()">TRY AGAIN</button>
    <div class="hint">Previously cached parts of KageNexus may still work from the installed app.</div>
  </main>
</body>
</html>
