name: Install Anime Haven
on:
  workflow_dispatch:
  issues:
    types: [opened]
permissions:
  contents: write
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Expand verified app package
        run: |
          unzip -o anime-haven.zip
          rm -f anime-haven.zip .github/workflows/install-anime-haven.yml
      - name: Commit the complete app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Install single-profile Anime Haven app"
          git push
