name: Build and publish Anime Haven
on:
  workflow_dispatch:
  issues:
    types: [opened]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: anime-haven-bootstrap
  cancel-in-progress: false
jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Expand complete app
        run: |
          cat anime-haven-payload.part00 anime-haven-v2.part01 anime-haven-v2.part02 anime-haven-v2.b64 | base64 --decode > anime-haven.zip
          unzip -o anime-haven.zip
          rm -f anime-haven.zip anime-haven-v2.part* anime-haven-v2.b64 anime-haven-payload.part* anime-haven-payload.b64 .github/workflows/bootstrap.yml
      - name: Commit complete app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build complete Anime Haven app"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload Anime Haven
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Deploy Anime Haven
        id: deployment
        uses: actions/deploy-pages@v4
